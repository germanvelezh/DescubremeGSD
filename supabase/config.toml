# supabase/config.toml — DescubreMe Phase 1.
#
# Anchors:
#   - 01-RESEARCH.md §Gate 1 (custom_access_token_hook registration).
#   - 01-PATTERNS.md §1.6 (Auth Hook pattern).
#   - 01-CONTEXT.md D1.4 (multi-tenant via JWT app_metadata.org_ids).
#
# `supabase config push` syncs these blocks against the linked project.
# When developing locally, `supabase start` reads this file directly.

project_id = "descubreme-local"

# ---------------------------------------------------------------------------
# Auth Hook — Supabase Custom Access Token Hook
# ---------------------------------------------------------------------------
# Maps to public.custom_access_token_hook(event jsonb) defined in
# 005_jwt_auth_hook.sql. The hook injects app_metadata.org_ids on every
# token issuance so RLS jsonb operators can read it without an extra
# server round trip (RESEARCH §Gate 2 patron canonico Phase 1).
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

# ---------------------------------------------------------------------------
# Email Auth — magic link flow
# ---------------------------------------------------------------------------
# Phase 1 onboarding is magic-link only (no password). The flags below
# match SKELETON.md "Auth UX" + CONTEXT D3.7.
[auth.email]
# Allow open signups during Phase 1; rate-limit + waitlist gate is at
# the route handler level (lib/ratelimit, Plan 01-08).
enable_signup = true
# Email change must be confirmed on BOTH the old + new address. Defense
# against account takeover via stale session (NFR-12 / COMPL-12).
double_confirm_changes = true
# Magic link is the primary auth path; explicit signup confirmation is
# redundant (the magic link itself proves email ownership).
enable_confirmations = false
# Defense in depth: even though magic-link flows do not issue password
# resets, keep secure_password_change on so any future password add-on
# inherits the safer default.
secure_password_change = true

# ---------------------------------------------------------------------------
# Edge Runtime — disabled
# ---------------------------------------------------------------------------
# Phase 1 does NOT use Supabase Edge Functions. Scoring runs in Next.js
# server actions (PATTERNS §1.10 locked decision: scoring in TypeScript,
# not Postgres functions, not Edge in hot path).
[edge_runtime]
enabled = false

# ---------------------------------------------------------------------------
# DB Seed — ordered component seed files run by `supabase db reset`
# ---------------------------------------------------------------------------
# Closes [GAP-SUPABASE-SEED-WIRING] (Plan 02-13). The CLI concatenates these
# files IN ARRAY ORDER and runs them as SQL after migrations (it does NOT
# support psql \ir, so each component seed is referenced directly here rather
# than via includes in supabase/seed.sql — that file is the human-readable
# index of this same order). All seeds are idempotent (ON CONFLICT / NOT
# EXISTS / scoped delete-then-insert). Order = dependency order:
#   instruments (instrument->version->items->scoring->baremo) -> narratives
#   -> integrator_rule -> product_stack -> contention -> occupations.
# Paths are relative to this config file's directory (supabase/).
[db.seed]
enabled = true
sql_paths = [
  "../db/seeds/instruments/ONET-IP-SF/instrument.sql",
  "../db/seeds/instruments/ONET-IP-SF/instrument-version.sql",
  "../db/seeds/instruments/ONET-IP-SF/items.sql",
  "../db/seeds/instruments/ONET-IP-SF/scoring-rule.sql",
  "../db/seeds/instruments/ONET-IP-SF/baremo-intl.sql",
  "../db/seeds/instruments/BFI-2-S/instrument.sql",
  "../db/seeds/instruments/BFI-2-S/instrument-version.sql",
  "../db/seeds/instruments/BFI-2-S/items.sql",
  "../db/seeds/instruments/BFI-2-S/scoring-rule.sql",
  "../db/seeds/instruments/BFI-2-S/baremo.sql",
  "../db/seeds/instruments/TwIVI/instrument-version.sql",
  "../db/seeds/instruments/TwIVI/items.sql",
  "../db/seeds/instruments/TwIVI/scoring-rule.sql",
  "../db/seeds/instruments/PERMA-Profiler/instrument-version.sql",
  "../db/seeds/instruments/PERMA-Profiler/items.sql",
  "../db/seeds/instruments/PERMA-Profiler/scoring-rule.sql",
  "../db/seeds/instruments/PERMA-Profiler/baremo.sql",
  "../db/seeds/narrative-templates/RIASEC/seed.sql",
  "../db/seeds/narrative-templates/BFI-2-S/seed.sql",
  "../db/seeds/narrative-templates/TwIVI/seed.sql",
  "../db/seeds/narrative-templates/PERMA-Profiler/seed.sql",
  "../db/seeds/integrator-rule/teaser/seed.sql",
  "../db/seeds/product-stack/free/seed.sql",
  "../db/seeds/contention-resources/CO/seed.sql",
  "../db/seeds/occupations/LATAM/seed.sql",
]
